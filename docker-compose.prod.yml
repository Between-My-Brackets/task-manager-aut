# ═══════════════════════════════════════════════════════
#  FlowBoard — Production Docker Compose
#  Usage: docker compose -f docker-compose.prod.yml up --build
#
#  Architecture:
#    nginx (80) → {/api → backend:8000, / → frontend:80}
# ═══════════════════════════════════════════════════════

services:

  # ── Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: flowboard-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── FastAPI Backend ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowboard-backend-prod
    expose:
      - "8000"
    environment:
      - APP_ENV=production
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - CORS_ORIGINS=http://localhost,http://localhost:80
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: always

  # ── React Frontend (nginx static) ────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api
    container_name: flowboard-frontend-prod
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
