name: CD — Production Deploy

# ── Trigger: push to main (via merged PR) ─────────────────────────────────
on:
  push:
    branches: [main]

jobs:

  # ════════════════════════════════════════════════════
  # Job 1: Run full test suite
  # ════════════════════════════════════════════════════
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Backend tests with coverage
        run: |
          pip install -r requirements.txt
          python -m pytest tests/ -v --cov=app --cov-fail-under=80
        working-directory: backend

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend tests
        run: |
          npm ci
          npm run test
        working-directory: frontend

  # ════════════════════════════════════════════════════
  # Job 2: Build & Push production Docker images
  # ════════════════════════════════════════════════════
  build-and-push:
    name: 🐳 Build & Push Production Images
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all tags for versioning

      - name: Determine version
        id: version
        run: |
          # Use latest git tag, or sha if no tags exist
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          SHA=$(git rev-parse --short HEAD)
          echo "version=${VERSION}-${SHA}" >> $GITHUB_OUTPUT
          echo "📦 Version: ${VERSION}-${SHA}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract repo name
        id: repo
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build & push backend (production)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/backend:latest
            ghcr.io/${{ steps.repo.outputs.name }}/backend:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build & push frontend (production)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/frontend:latest
            ghcr.io/${{ steps.repo.outputs.name }}/frontend:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ════════════════════════════════════════════════════
  # Job 3: Deploy to Production (simulated rolling update)
  # ════════════════════════════════════════════════════
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production   # Requires manual approval in GitHub Environments

    steps:
      - uses: actions/checkout@v4

      - name: Production rolling deploy
        run: |
          # ─────────────────────────────────────────────────────────────────
          # Real production deployment pattern (zero-downtime rolling):
          #
          # - uses: appleboy/ssh-action@v1
          #   with:
          #     host: ${{ secrets.PROD_HOST }}
          #     username: ${{ secrets.PROD_USER }}
          #     key: ${{ secrets.PROD_SSH_KEY }}
          #     script: |
          #       cd /opt/flowboard
          #       # Pull new images
          #       docker compose -f docker-compose.prod.yml pull
          #       # Rolling restart (zero downtime with nginx)
          #       docker compose -f docker-compose.prod.yml up -d \
          #         --remove-orphans \
          #         --no-deps \
          #         backend
          #       sleep 15  # Wait for backend health
          #       docker compose -f docker-compose.prod.yml up -d \
          #         --no-deps \
          #         frontend
          # ─────────────────────────────────────────────────────────────────
          echo "🚀 Deploying FlowBoard to PRODUCTION"
          echo "📦 Version: ${{ needs.build-and-push.outputs.version }}"
          echo ""
          echo "📋 Rolling deploy sequence:"
          echo "  1. Pull new backend image"
          echo "  2. Restart backend (nginx keeps old frontend up)"
          echo "  3. Health check passes"
          echo "  4. Pull & restart frontend"
          echo "  5. Re-run health checks"
          echo ""
          echo "✅ Production deploy complete!"
          echo "   App URL: https://flowboard.dev"

      - name: Tag release in Git
        run: |
          echo "🏷  Creating release tag: ${{ needs.build-and-push.outputs.version }}"
          echo "   (Would run: git tag -a $VERSION -m 'Release $VERSION')"
          echo "   (Would run: git push origin $VERSION)"

      - name: Notify production deployment
        run: |
          echo "📣 Production deployment notifications:"
          echo "   → Slack: #deployments channel"
          echo "   → Email: engineering@flowboard.dev"
          echo "   → PagerDuty: deployment event logged"
