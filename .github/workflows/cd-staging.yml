name: CD — Staging Deploy

# ── Trigger: after any push to dev ────────────────────────────────────────
on:
  push:
    branches: [dev]

jobs:

  # ════════════════════════════════════════════════════
  # Job 1: Run tests (gate before deploy)
  # ════════════════════════════════════════════════════
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Backend tests
        run: |
          pip install -r requirements.txt
          python -m pytest tests/ -v --tb=short
        working-directory: backend

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend tests
        run: |
          npm ci
          npm run test
        working-directory: frontend

  # ════════════════════════════════════════════════════
  # Job 2: Build & Push Docker images to GHCR
  # ════════════════════════════════════════════════════
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT
          echo "repo=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build & push backend (staging)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}/backend:staging
            ghcr.io/${{ steps.meta.outputs.repo }}/backend:staging-${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend (staging)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}/frontend:staging
            ghcr.io/${{ steps.meta.outputs.repo }}/frontend:staging-${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ════════════════════════════════════════════════════
  # Job 3: Deploy to Staging
  # ════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Extract metadata
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Deploy to staging server
        run: |
          # ─────────────────────────────────────────────────────────────────
          # In a real project, this would SSH into the staging server:
          #
          # - uses: appleboy/ssh-action@v1
          #   with:
          #     host: ${{ secrets.STAGING_HOST }}
          #     username: ${{ secrets.STAGING_USER }}
          #     key: ${{ secrets.STAGING_SSH_KEY }}
          #     script: |
          #       cd /opt/flowboard
          #       docker compose -f docker-compose.prod.yml pull
          #       docker compose -f docker-compose.prod.yml up -d --remove-orphans
          #
          # For this workshop, we simulate the deploy:
          # ─────────────────────────────────────────────────────────────────
          echo "Deploying FlowBoard to STAGING environment"
          echo "Image tags:"
          echo "   backend:staging-${{ steps.meta.outputs.sha_short }}"
          echo "   frontend:staging-${{ steps.meta.outputs.sha_short }}"
          echo ""
          echo "Simulated deploy commands:"
          echo "   docker compose -f docker-compose.prod.yml pull"
          echo "   docker compose -f docker-compose.prod.yml up -d --remove-orphans"
          echo ""
          echo "Staging deploy complete!"
          echo "   App URL: https://staging.flowboard.dev"

      - name: Post-deploy health check
        run: |
          echo "Running post-deploy health check..."
          echo "   GET https://staging.flowboard.dev/health → 200 OK"
          echo "Health check passed"

      - name: Notify deployment success
        run: |
          echo "Staging deployment notification would be sent here"
          echo "   (e.g., Slack webhook, email, Teams)"
