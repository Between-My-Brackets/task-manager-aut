name: CI — Lint · Test · Build

# ── Triggers ──────────────────────────────────────────────────────────────
on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

# ── Concurrency: cancel in-progress runs on new push ──────────────────────
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ════════════════════════════════════════════════════
  # Job 1: Lint Backend (Python — ruff + black)
  # ════════════════════════════════════════════════════
  lint-backend:
    name: 🔍 Lint Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install linting tools
        run: pip install ruff black

      - name: Run ruff (fast linter)
        run: ruff check backend/app/ backend/tests/

      - name: Run black (format check)
        run: black --check backend/app/ backend/tests/

  # ════════════════════════════════════════════════════
  # Job 2: Lint Frontend (ESLint + Prettier)
  # ════════════════════════════════════════════════════
  lint-frontend:
    name: 🔍 Lint Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run ESLint
        run: npm run lint
        working-directory: frontend

      - name: Run Prettier check
        run: npm run format:check
        working-directory: frontend

  # ════════════════════════════════════════════════════
  # Job 3: Test Backend (pytest + coverage)
  # ════════════════════════════════════════════════════
  test-backend:
    name: 🧪 Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run pytest with coverage
        run: |
          python -m pytest tests/ \
            -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80
        working-directory: backend

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  # ════════════════════════════════════════════════════
  # Job 4: Test Frontend (vitest + coverage)
  # ════════════════════════════════════════════════════
  test-frontend:
    name: 🧪 Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: frontend

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ════════════════════════════════════════════════════
  # Job 5: Docker Build Smoke Test
  # ════════════════════════════════════════════════════
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend, test-backend, test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: flowboard-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: flowboard-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — backend health
        run: |
          docker run -d --name test-backend -p 8000:8000 flowboard-backend:ci
          sleep 10
          curl -f http://localhost:8000/health || (docker logs test-backend && exit 1)
          docker stop test-backend

  # ════════════════════════════════════════════════════
  # Summary Job (required for branch protection)
  # ════════════════════════════════════════════════════
  ci-success:
    name: ✅ CI Passed
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend, test-backend, test-frontend, docker-build]
    if: always()

    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.lint-backend.result }}" != "success" || \
                "${{ needs.lint-frontend.result }}" != "success" || \
                "${{ needs.test-backend.result }}" != "success" || \
                "${{ needs.test-frontend.result }}" != "success" || \
                "${{ needs.docker-build.result }}" != "success" ]]; then
            echo "❌ CI failed — one or more jobs did not succeed"
            exit 1
          fi
          echo "✅ All CI checks passed!"
